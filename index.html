<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindSpace</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌿 MindSpace</h1>
<p class="tag">Share thoughts. Support each other.</p>

<div class="card">

<textarea id="postInput" placeholder="How are you feeling today?"></textarea>

<div class="buttons">
<button onclick="addPost()">Share</button>
<button onclick="clearPosts()">Clear Feed</button>
</div>

</div>

<h2>Community</h2>

<div id="feed"></div>

</div>

<script src="script.js"></script>

</body>
</html>
